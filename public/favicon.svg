<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <g transform="translate(256, 256)" filter="url(#glow)">
    <circle r="120" fill="none" stroke="#3b82f6" stroke-width="3" opacity="0.3"/>
    <circle r="90" fill="none" stroke="#3b82f6" stroke-width="2" opacity="0.5"/>
    <text x="0" y="40" font-size="160" font-family="monospace" font-weight="700" text-anchor="middle" fill="#3b82f6">Δ</text>
    <circle cx="-70" cy="-50" r="8" fill="#ef4444"/>
    <circle cx="70" cy="60" r="8" fill="#3b82f6"/>
  </g>
</svg>
